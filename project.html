<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — OpenFF Roadmap</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/project.css">
  <script>
    (function(){
      var t=localStorage.getItem("openff-theme")||
        (window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
      document.documentElement.setAttribute("data-theme",t);
    })();
  </script>
</head>
<body>

<!-- Navigation -->
<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="nav-logo">Open<span>FF</span> Roadmap</a>
    <nav class="nav-breadcrumb" id="breadcrumb">
      <!-- Populated by project.js -->
    </nav>
    <a href="index.html" class="nav-home-link">← All projects</a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
  </div>
</nav>

<!-- Page content -->
<main class="page-content">
  <div class="container">

    <!-- Hero -->
    <div id="project-hero" class="project-hero">
      <!-- Populated by project.js -->
    </div>

    <!-- Pipeline stepper -->
    <section class="pipeline-section">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
        <h2>Pipeline Stages</h2>
      </div>
      <div id="pipeline-stepper" class="pipeline-stepper">
        <!-- Populated by project.js -->
      </div>
    </section>

    <!-- Two-column: Goals/Benefits + FTE -->
    <div class="two-col">
      <div>
        <div class="section-header">
          <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <h2>Goals &amp; Benefits</h2>
        </div>
        <div id="project-goals" class="goals-section">
          <!-- Populated by project.js -->
        </div>
      </div>

      <div id="project-fte" class="fte-section">
        <!-- Populated by project.js -->
      </div>
    </div>

    <!-- Timeline -->
    <section class="timeline-section">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <h2>Timeline &amp; Milestones</h2>
      </div>
      <div id="project-timeline">
        <!-- Populated by project.js -->
      </div>
    </section>

    <!-- Metrics for success -->
    <section class="metrics-section">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <h2>Metrics for Success</h2>
      </div>
      <div id="project-metrics">
        <!-- Populated by project.js -->
      </div>
    </section>

    <!-- Go/No-Go decision points -->
    <section class="gonogo-section">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <h2>Go / No-Go Decision Points</h2>
      </div>
      <div id="project-gonogo">
        <!-- Populated by project.js -->
      </div>
    </section>

    <!-- Dependencies & unlocks -->
    <section class="deps-section">
      <div class="section-header">
        <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        <h2>Dependencies &amp; Unlocks</h2>
      </div>
      <div id="project-deps">
        <!-- Populated by project.js -->
      </div>
    </section>

    <!-- Prev/Next navigation -->
    <div id="project-nav" class="project-nav">
      <!-- Populated by project.js -->
    </div>

  </div>
</main>

<script type="module">
  import { initTheme } from "./js/theme.js";
  import { initProject } from "./js/project.js?v=3";
  initTheme();
  initProject();
</script>

</body>
</html>
